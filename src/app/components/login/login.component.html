<div class="login">
  <div class="login-wrapper">
    <div class="login-bg">
      <div class="box">
        <div class="container">
          <div class="logo">
            <img alt="logo" src="../assets/logo.png" width="150px"/>
          </div>
          <div class="sign-in">
            <form (submit)="login($event)">
              <div class="input-group">
                <input [placeholder]="'commons.email' | translate" autocomplete="off" class="form-control"
                       name="email"
                       type="text" [(ngModel)]="email"/>
              </div>
              <div class="input-group">
                <input [placeholder]="'commons.password' | translate" class="form-control" name="password"
                       type="password" [(ngModel)]="password"/>
              </div>
              <div class="login-actions">
                <button [disabled]="!email || !password" (click)="login($event)"
                        class="btn  btn-pill login-btn">{{'commons.sign_in' | translate}}
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
